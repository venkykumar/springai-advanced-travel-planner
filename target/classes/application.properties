spring.application.name=springai-advanced
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.org.springframework.ai=INFO

# Disable unused AI model types
spring.ai.model.image=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.moderation=none

# Active chat model — set to "openai" or "anthropic" (env: SPRING_AI_ACTIVE_MODEL)
# Embedding always uses OpenAI (Anthropic has no embedding model)
spring.ai.active.model=${SPRING_AI_ACTIVE_MODEL:openai}

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.3
spring.ai.openai.embedding.options.model=text-embedding-3-small

# Anthropic Claude
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.temperature=0.3

# PostgreSQL — shared by PgVectorStore and JdbcChatMemoryRepository
spring.datasource.url=jdbc:postgresql://localhost:5432/travelplanner
spring.datasource.username=${POSTGRES_USER:traveluser}
spring.datasource.password=${POSTGRES_PASSWORD:travelpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# PgVector — persistent embeddings with HNSW index (production-grade vs SimpleVectorStore)
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW

# Agent orchestration config
travel.agent.parallel-timeout-seconds=60
travel.agent.max-budget-retries=2
travel.agent.thread-pool-size=10

# Knowledge base ingestion — set true on first run, false thereafter
travel.agent.ingest-knowledge-base=true

server.port=8080